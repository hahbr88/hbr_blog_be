services:
  db:
    image: postgres:16-alpine
    container_name: hbr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hbr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: hbr-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hbr_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      for i in $(seq 1 30); do
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && break;
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb -p local/$$MINIO_BUCKET || true;
      mc anonymous set download local/$$MINIO_BUCKET || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}

  redis:
    image: redis:7-alpine
    container_name: hbr-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
    container_name: hbr-blog-api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8152:8000"
    volumes:
      - .:/code
    working_dir: /code
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENV: dev
      DEV_ADMIN_TOKEN: ${DEV_ADMIN_TOKEN}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS}
      TRUST_X_FORWARDED_FOR: ${TRUST_X_FORWARDED_FOR}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CDN_BASE_URL: ${CDN_BASE_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      THUMBNAIL_PROCESSOR: ${THUMBNAIL_PROCESSOR}
      THUMBNAIL_QUEUE_NAME: ${THUMBNAIL_QUEUE_NAME}
      THUMBNAIL_MAX_RETRIES: ${THUMBNAIL_MAX_RETRIES}
      REDIS_URL: ${REDIS_URL}
    command: sh -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
    container_name: hbr-thumbnail-worker
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/code
    working_dir: /code
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CDN_BASE_URL: ${CDN_BASE_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      THUMBNAIL_PROCESSOR: ${THUMBNAIL_PROCESSOR}
      THUMBNAIL_QUEUE_NAME: ${THUMBNAIL_QUEUE_NAME}
      THUMBNAIL_MAX_RETRIES: ${THUMBNAIL_MAX_RETRIES}
      REDIS_URL: ${REDIS_URL}
    command: sh -lc "rq worker ${THUMBNAIL_QUEUE_NAME}"

volumes:
  hbr_pgdata:
  hbr_minio_data:
