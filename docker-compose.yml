services:
  db:
    image: postgres:16-alpine
    container_name: hbr-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - hbr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
    container_name: hbr-blog-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8152:8000"
    volumes:
      - .:/code
    working_dir: /code
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS}
      TRUST_X_FORWARDED_FOR: ${TRUST_X_FORWARDED_FOR}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS}
    command: sh -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  hbr_pgdata:
